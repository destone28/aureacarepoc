<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AureaCare · Accedi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="js/styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,140,0,.08), transparent 55%),
        radial-gradient(circle at 80% 90%, rgba(59,130,246,.12), transparent 55%),
        linear-gradient(180deg, #FEFCF8, #F4F0E9);
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(45,45,45,.12);
    }
    .brand-row {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 8px;
    }
    .brand-logo {
      position: relative;
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #2D2D2D, #1a1a1a);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 20px;
      letter-spacing: -0.5px;
    }
    .brand-logo .badge-care {
      position: absolute;
      bottom: -5px; right: -8px;
      background: var(--care-blue);
      color: #fff;
      font-size: 9px; font-weight: 700;
      padding: 2px 5px;
      border-radius: 5px;
      border: 2px solid #fff;
      line-height: 1;
      letter-spacing: 0.04em;
    }
    .brand-text {
      font-size: 22px; font-weight: 700; letter-spacing: -0.01em;
    }
    .brand-tag { text-align: center; color: var(--medium-gray); font-size: 13px; margin-bottom: 28px; }
    .title { font-size: 22px; font-weight: 700; text-align: center; }
    .subtitle { font-size: 14px; color: var(--medium-gray); text-align: center; margin: 4px 0 24px; }
    .signup-row { text-align: center; font-size: 13px; color: var(--medium-gray); margin-top: 16px; }
    .signup-row a { color: var(--care-blue); font-weight: 700; }
    .divider-or {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0;
      color: var(--medium-gray); font-size: 12px;
    }
    .divider-or::before, .divider-or::after { content: ''; flex: 1; height: 1px; background: var(--border-soft); }
    .spid-btn {
      width: 100%; padding: 12px;
      background: #fff;
      border: 1px solid var(--border-gray);
      border-radius: var(--r-md);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
    }
    .spid-btn:hover { background: #FAFAFA; }
    .spid-badge {
      background: linear-gradient(135deg, #0066CC, #002F6E);
      color: #fff;
      font-size: 11px; font-weight: 700;
      padding: 2px 6px; border-radius: 4px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="login-card slide-up">
    <div class="brand-row">
      <div class="brand-logo">A<span class="badge-care">CARE</span></div>
      <span class="brand-text">AureaCare</span>
    </div>
    <p class="brand-tag">Accesso unificato Aurea Suite</p>

    <h1 class="title">Entra nel tuo account</h1>
    <p class="subtitle">Usa le stesse credenziali di AureaVia e AureaShuttle.</p>

    <form id="loginForm">
      <div class="field">
        <label class="field-label" for="email">Email</label>
        <div class="input-container">
          <span id="ico-mail"></span>
          <input type="email" id="email" class="input" placeholder="nome@email.it" autocomplete="email" required>
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="input-container">
          <span id="ico-lock"></span>
          <input type="password" id="password" class="input" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <a href="#" class="link" style="display:block;text-align:right;font-size:13px;color:var(--care-blue);margin-top:6px;font-weight:600">Password dimenticata?</a>
      </div>
      <button type="submit" class="btn btn--care btn--block btn--lg">Accedi</button>
    </form>

    <div class="divider-or"><span>oppure</span></div>
    <button class="spid-btn" onclick="showToast('Login SPID: in arrivo','info')">
      <span class="spid-badge">SPID</span>
      <span>Entra con identità digitale</span>
    </button>

    <div class="signup-row">Non hai un account? <a href="onboarding.html">Registrati come paziente</a></div>

    <div class="suite-footer">
      <a class="suite-item via" href="https://destone28.github.io/aureaviapoc/" target="_blank" rel="noopener">
        <span class="suite-dot">V</span>AureaVia
      </a>
      <a class="suite-item shuttle" href="#" onclick="event.preventDefault();showToast('AureaShuttle: in arrivo','info')">
        <span class="suite-dot">S</span>AureaShuttle
      </a>
      <span class="suite-item current care">
        <span class="suite-dot">C</span>AureaCare
      </span>
    </div>

    <p class="caption text-center" style="margin-top:20px"><a href="admin-login.html" style="color:var(--medium-gray);text-decoration:underline">Sei un amministratore?</a></p>
  </div>

  <div id="toast-container"></div>

  <script src="js/icons.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    document.getElementById('ico-mail').outerHTML = aIcon('mail', { size: 18 });
    document.getElementById('ico-lock').outerHTML = aIcon('lock', { size: 18 });

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return showToast('Inserisci email e password','error');
      setAuth({
        email,
        role: 'patient',
        patient_id: 'PAT-00142',
        name: 'Lucia Marchetti',
        apps: ['via','shuttle','care']
      });
      showToast('Benvenuta in AureaCare','care');
      setTimeout(()=> location.href = 'home.html', 700);
    });
  </script>
</body>
</html>
