<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AureaCare · Strutture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="js/styles.css">
  <style>
    .strs-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border-soft);
      background: #fff;
    }
    .strs-filters {
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid var(--border-soft);
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    .strs-filters .chip { display: inline-flex; }
    .str-row {
      display: flex; gap: 12px;
      background: #fff;
      border: 1px solid var(--border-soft);
      border-radius: var(--r-md);
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all .15s ease;
      text-decoration: none; color: inherit;
    }
    .str-row:hover { border-color: var(--care-blue); transform: translateY(-1px); box-shadow: var(--shadow); }
    .str-thumb {
      width: 64px; height: 64px;
      border-radius: 12px;
      flex-shrink: 0;
      background:
        repeating-linear-gradient(45deg, #f3eee5 0 8px, #ece6d8 8px 16px);
      display: flex; align-items: center; justify-content: center;
      color: rgba(80,80,80,.5);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      text-align: center;
      letter-spacing: 0.06em;
    }
    .str-body { flex: 1; min-width: 0; }
    .str-name { font-weight: 700; font-size: 14px; line-height: 1.3; }
    .str-row .str-meta { font-size: 12px; color: var(--medium-gray); margin-top: 2px; line-height: 1.45; }
    .str-row .str-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .str-row .str-tag { font-size: 10px; background: var(--light-gray); color: var(--medium-gray); padding: 2px 6px; border-radius: 4px; font-weight: 600; }
    .str-meta-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .star-mini { color: #F59E0B; font-weight: 700; font-size: 12px; }
    .map-pin-2 { position: absolute; }
  </style>
</head>
<body>
  <div class="patient-app">
    <header class="patient-header">
      <button class="icon-btn" onclick="history.back()" aria-label="Indietro"><span id="ico-back"></span></button>
      <div class="brand" style="font-size:15px">Strutture convenzionate</div>
      <div class="app-switcher-wrap">
        <button class="icon-btn" data-app-switcher aria-label="App suite"><span id="ico-grid"></span></button>
      </div>
    </header>

    <!-- Banner Roma sticky -->
    <div style="padding: 12px 20px 0; background: #fff;">
      <div class="banner-roma">
        <span id="ico-pin"></span>
        <p>Il servizio AureaCare copre inizialmente l'area del <strong>Comune di Roma</strong>. Espansione progressiva in altre città.</p>
      </div>
    </div>

    <!-- Mappa Leaflet/OpenStreetMap (sostituisce placeholder statico) -->
    <div class="aurea-map mt-12" id="strs-map" style="height:260px">
      <div class="map-legend">
        <div class="row"><span class="dot dot--care"></span>Strutture</div>
        <div class="row"><span class="dot dot--home"></span>Casa</div>
      </div>
    </div>

    <!-- Filtri sticky -->
    <div class="strs-filters">
      <div class="chips" id="filter-chips">
        <button class="chip active" data-filter="all">Tutte le specialità</button>
        <button class="chip" data-filter="cardio">Cardiologia</button>
        <button class="chip" data-filter="orto">Ortopedia</button>
        <button class="chip" data-filter="fisio">Fisioterapia</button>
        <button class="chip" data-filter="derma">Dermatologia</button>
        <button class="chip" data-filter="near">≤ 5 km</button>
        <button class="chip" data-filter="today">Disponibile oggi</button>
        <button class="chip" data-filter="cheap">Tariffa bassa</button>
      </div>
    </div>

    <div class="patient-content">
      <div class="flex justify-between items-center mb-12">
        <p class="caption" id="str-summary"></p>
        <button class="btn btn--secondary btn--sm" style="padding:6px 12px" id="sort-btn"><span id="ico-filter"></span>Ordina</button>
      </div>
      <div id="str-list"></div>
    </div>

    <!-- Bottom sheet: Ordina -->
    <div class="sheet-backdrop" id="sort-bg" onclick="closeSort()"></div>
    <div class="sheet" id="sort-sheet">
      <div class="sheet-handle"></div>
      <h3>Ordina per</h3>
      <p class="caption mb-16">Scegli l'ordine di visualizzazione delle strutture.</p>
      <div class="slots" id="sort-opts" style="grid-template-columns:1fr">
        <button class="slot selected" data-sort="distance">Distanza · più vicina prima</button>
        <button class="slot" data-sort="rating">Valutazione · migliore prima</button>
        <button class="slot" data-sort="tariff">Tariffa convenzionata · più bassa</button>
        <button class="slot" data-sort="slot">Disponibilità · slot più vicino</button>
      </div>
      <button class="btn btn--care btn--block btn--lg mt-16" onclick="applySort()">Applica ordine</button>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item" href="home.html"><span id="nv-home"></span>Home</a>
      <a class="nav-item active" href="my-cures.html"><span id="nv-cure"></span>Cure</a>
      <a class="nav-item" href="wallet.html"><span id="nv-wallet"></span>Wallet</a>
      <a class="nav-item" href="profile.html"><span id="nv-profile"></span>Profilo</a>
    </nav>
  </div>

  <div id="toast-container"></div>

  <script src="data/mock-data.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    document.getElementById('ico-back').outerHTML = aIcon('arrow-left', { size: 20 });
    document.getElementById('ico-grid').outerHTML = aIcon('grid', { size: 20 });
    document.getElementById('ico-pin').outerHTML  = aIcon('map-pin', { size: 18 });
    document.getElementById('ico-filter').outerHTML = aIcon('filter', { size: 14 });
    document.getElementById('nv-home').outerHTML   = aIcon('home',    { size: 22 });
    document.getElementById('nv-cure').outerHTML   = aIcon('heart',   { size: 22 });
    document.getElementById('nv-wallet').outerHTML = aIcon('wallet',  { size: 22 });
    document.getElementById('nv-profile').outerHTML= aIcon('user',    { size: 22 });

    const list = document.getElementById('str-list');
    const allActive = MOCK.structures.filter(s => s.active);

    let currentFilter = 'all';
    let currentSort = 'distance';

    const filterFns = {
      all:    () => true,
      cardio: s => s.specialties.some(x => /cardio/i.test(x)),
      orto:   s => s.specialties.some(x => /ortop|riabilit/i.test(x)),
      fisio:  s => s.specialties.some(x => /fisio|logoped|osteop/i.test(x)),
      derma:  s => s.specialties.some(x => /dermat/i.test(x)),
      near:   s => s.distance_km <= 5,
      today:  s => /oggi|domani/i.test(s.next_slot),
      cheap:  s => s.tariff_factor <= 0.95
    };
    const sortFns = {
      distance: (a, b) => a.distance_km - b.distance_km,
      rating:   (a, b) => b.rating - a.rating,
      tariff:   (a, b) => a.tariff_factor - b.tariff_factor,
      slot:     (a, b) => (/(oggi|domani)/i.test(a.next_slot) ? 0 : 1) - (/(oggi|domani)/i.test(b.next_slot) ? 0 : 1)
    };

    function renderList() {
      const filtered = allActive.filter(filterFns[currentFilter]).sort(sortFns[currentSort]);
      document.getElementById('str-summary').textContent =
        `${filtered.length} ${filtered.length === 1 ? 'struttura' : 'strutture'} a Roma` +
        (currentFilter !== 'all' ? ' · filtro attivo' : '');
      list.innerHTML = '';
      if (!filtered.length) {
        list.innerHTML = `<div class="card card--padded-lg text-center" style="margin-top:12px">
          ${aIcon('map-pin',{size:32,cls:'mb-12'})}
          <p style="font-weight:700">Nessuna struttura in questo filtro</p>
          <p class="caption">Prova a rimuovere alcuni filtri o ad allargare il raggio.</p>
        </div>`;
        renderMap(allActive);
        return;
      }
      filtered.forEach(s => {
        const row = document.createElement('a');
        row.className = 'str-row';
        row.href = `booking.html?structure=${s.id}`;
        const tagsHtml = s.specialties.slice(0,3).map(sp => `<span class="str-tag">${sp}</span>`).join('');
        row.innerHTML = `
          <div class="str-thumb">struttura</div>
          <div class="str-body">
            <div class="str-name">${s.name}</div>
            <div class="str-meta">${s.address} · ${s.district}</div>
            <div class="str-meta-row">
              <span class="star-mini">★ ${s.rating.toFixed(1)}</span>
              <span class="caption">(${s.reviews})</span>
              <span class="caption">·</span>
              <span class="caption" style="color:var(--care-blue);font-weight:600">${s.distance_km.toFixed(1)} km</span>
            </div>
            <div class="str-tags">${tagsHtml}${s.specialties.length>3 ? '<span class="str-tag">+'+(s.specialties.length-3)+'</span>' : ''}</div>
            <div class="str-meta" style="margin-top:6px"><span style="color:var(--b-approved-tx);font-weight:600">${s.next_slot}</span> · prossimo slot</div>
          </div>`;
        list.appendChild(row);
      });
      renderMap(filtered);
    }

    let mapInstance = null;
    function renderMap(items) {
      mapInstance = aMap.init('strs-map', {
        structures: items,
        showPatient: true,
        onPick: (s) => location.href = 'booking.html?structure=' + s.id
      });
    }

    // Filtri chip
    document.getElementById('filter-chips').addEventListener('click', (e) => {
      const c = e.target.closest('.chip');
      if (!c) return;
      document.querySelectorAll('#filter-chips .chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      currentFilter = c.dataset.filter;
      renderList();
    });

    // Sort sheet
    document.getElementById('sort-btn').addEventListener('click', () => {
      document.getElementById('sort-sheet').classList.add('open');
      document.getElementById('sort-bg').classList.add('open');
    });
    function closeSort() {
      document.getElementById('sort-sheet').classList.remove('open');
      document.getElementById('sort-bg').classList.remove('open');
    }
    document.querySelectorAll('#sort-opts .slot').forEach(o => {
      o.addEventListener('click', () => {
        document.querySelectorAll('#sort-opts .slot').forEach(x => x.classList.remove('selected'));
        o.classList.add('selected');
      });
    });
    function applySort() {
      const sel = document.querySelector('#sort-opts .slot.selected');
      currentSort = sel ? sel.dataset.sort : 'distance';
      closeSort();
      renderList();
      showToast('Ordine: ' + sel.textContent.trim(), 'care');
    }

    renderList();
  </script>
</body>
</html>
