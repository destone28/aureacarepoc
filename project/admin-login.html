<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AureaCare · Admin login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="js/styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background:
        radial-gradient(circle at 15% 15%, rgba(255,140,0,.08), transparent 50%),
        radial-gradient(circle at 85% 85%, rgba(59,130,246,.07), transparent 50%),
        linear-gradient(180deg, #14171D, #1a1d24);
      padding: 24px;
      color: #fff;
    }
    .admin-card {
      background: #fff;
      color: var(--ink);
      width: 100%;
      max-width: 460px;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 30px 80px rgba(0,0,0,.4);
    }
    .admin-brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .admin-brand .logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--primary-orange), var(--secondary-orange));
      border-radius: 10px;
      color: #fff;
      font-weight: 700; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .admin-brand .pill {
      font-size: 10px; font-weight: 700; padding: 3px 8px;
      background: var(--care-blue-light); color: var(--care-blue-dark);
      border-radius: 4px; letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="admin-card slide-up">
    <div class="admin-brand">
      <div class="logo">A</div>
      <div>
        <p style="font-size:18px;font-weight:700;line-height:1.1">AureaCare</p>
        <p class="caption" style="margin-top:2px">Console amministrativa <span class="pill">ADMIN</span></p>
      </div>
    </div>

    <h1 style="font-size:22px;font-weight:700">Accedi alla console</h1>
    <p class="caption mb-24" style="margin-top:4px">Gestione approvazioni, strutture e pazienti AureaCare.</p>

    <form id="adminForm">
      <div class="field">
        <label class="field-label">Email amministratore</label>
        <div class="input-container">
          <span id="ico-mail"></span>
          <input type="email" id="email" class="input" placeholder="admin@aureacare.it" required>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <div class="input-container">
          <span id="ico-lock"></span>
          <input type="password" id="password" class="input" placeholder="••••••••" required>
        </div>
      </div>
      <div class="field" style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="2fa" style="accent-color:var(--care-blue);width:16px;height:16px">
        <label for="2fa" class="caption">Richiedi 2FA dopo l'accesso</label>
      </div>
      <button type="submit" class="btn btn--primary btn--block btn--lg">Accedi alla dashboard</button>
    </form>

    <p class="caption text-center mt-20">
      <a href="index.html" style="color:var(--medium-gray);text-decoration:underline">← Torna al login paziente</a>
    </p>
    <p class="dev-credit">Sviluppato da <a href="https://www.linkedin.com/in/emilio-destratis-3894b2119/" target="_blank" rel="noopener">3DSprinted</a> · Emilio Destratis</p>
  </div>

  <div id="toast-container"></div>

  <script src="js/icons.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    document.getElementById('ico-mail').outerHTML = aIcon('mail', { size: 18 });
    document.getElementById('ico-lock').outerHTML = aIcon('lock', { size: 18 });
    document.getElementById('adminForm').addEventListener('submit', (e) => {
      e.preventDefault();
      setAuth({ email: document.getElementById('email').value || 'admin@aureacare.it', role: 'admin', name: 'Filippo Rinaldi', apps: ['care','via','shuttle'] });
      showToast('Accesso console AureaCare', 'care');
      setTimeout(() => location.href = 'admin-dashboard.html', 600);
    });
  </script>
</body>
</html>
